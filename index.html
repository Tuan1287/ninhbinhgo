<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ninh Bình AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f8f8f6;
    --surface: #ffffff;
    --border: #e8e8e4;
    --ink: #111110;
    --muted: #888884;
    --tag-bg: #f0f0ec;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--ink);
    height: 100vh;
    display: grid;
    grid-template-rows: auto auto 1fr auto auto;
    overflow: hidden;
  }

  header {
    padding: 1rem 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    gap: 1rem;
  }

  .brand { display: flex; align-items: baseline; gap: 0.5rem; cursor: pointer; }
  .brand:hover .brand-name { opacity: 0.65; }
  .brand-name {
    font-family: 'DM Serif Display', serif;
    font-size: 1.2rem;
    letter-spacing: -0.02em;
    transition: opacity 0.15s;
  }
  .brand-tag {
    font-size: 0.7rem;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    flex-shrink: 0;
  }

  #disclaimer {
    font-size: 0.7rem;
    color: #bbb;
    font-style: italic;
    white-space: nowrap;
    margin-right: 0.25rem;
  }

  /* Icon buttons */
  .icon-btn {
    width: 34px; height: 34px;
    border-radius: 8px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.18s;
    flex-shrink: 0;
    font-size: 14px;
    position: relative;
    border: 1.5px solid transparent;
  }
  .icon-btn svg { width: 15px; height: 15px; transition: stroke 0.18s; }

  /* Nút xóa chat — đỏ nhạt */
  #clearBtn {
    background: #fff1f1;
    border-color: #fca5a5;
  }
  #clearBtn svg { stroke: #ef4444; }
  #clearBtn:hover { background: #ef4444; border-color: #ef4444; }
  #clearBtn:hover svg { stroke: white; }

  /* Nút đổi key — vàng nhạt */
  #keyBtn {
    background: #fffbeb;
    border-color: #fcd34d;
  }
  #keyBtn svg { stroke: #d97706; }
  #keyBtn:hover { background: #d97706; border-color: #d97706; }
  #keyBtn:hover svg { stroke: white; }

  /* Tooltip */
  .icon-btn::after {
    content: attr(data-tip);
    position: absolute;
    bottom: calc(100% + 7px);
    left: 50%;
    transform: translateX(-50%);
    background: var(--ink);
    color: white;
    font-size: 0.68rem;
    white-space: nowrap;
    padding: 0.22rem 0.5rem;
    border-radius: 5px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.15s;
    font-family: 'DM Sans', sans-serif;
  }
  .icon-btn:hover::after { opacity: 1; }

  #langBtn {
    background: var(--tag-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.28rem 0.65rem;
    font-size: 0.75rem;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
  }
  #langBtn:hover { background: var(--ink); color: white; border-color: var(--ink); }

  .topics {
    padding: 0.65rem 1.5rem;
    display: flex;
    gap: 0.4rem;
    overflow-x: auto;
    scrollbar-width: none;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }
  .topics::-webkit-scrollbar { display: none; }

  .chip {
    background: var(--tag-bg);
    border: 1px solid var(--border);
    color: var(--ink);
    padding: 0.3rem 0.8rem;
    border-radius: 6px;
    font-size: 0.78rem;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
  }
  .chip:hover { background: var(--ink); color: white; border-color: var(--ink); }

  #messages {
    overflow-y: auto;
    padding: 1.75rem 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 1.25rem;
    scroll-behavior: smooth;
  }
  #messages::-webkit-scrollbar { width: 3px; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .welcome {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 1.5rem;
    padding: 0.5rem 0;
    max-width: 600px;
  }
  .welcome-heading {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(1.8rem, 4vw, 2.5rem);
    line-height: 1.15;
    letter-spacing: -0.03em;
  }
  .welcome-heading em { font-style: italic; color: var(--muted); }
  .welcome-sub { font-size: 0.875rem; color: var(--muted); line-height: 1.7; font-weight: 300; max-width: 420px; }

  .suggestions { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.5rem; width: 100%; max-width: 520px; }
  .sug-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.85rem 1rem;
    text-align: left;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.15s;
  }
  .sug-btn:hover { border-color: var(--ink); background: var(--ink); color: white; }
  .sug-btn:hover .sug-label { color: rgba(255,255,255,0.5); }
  .sug-icon { font-size: 1rem; margin-bottom: 0.35rem; display: block; }
  .sug-text { font-size: 0.82rem; font-weight: 400; line-height: 1.4; display: block; }
  .sug-label { font-size: 0.7rem; color: var(--muted); display: block; margin-top: 0.2rem; font-weight: 300; }

  .msg { display: flex; gap: 0.75rem; animation: fadeIn 0.25s ease; max-width: 720px; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; max-width: 75%; }

  .avatar {
    width: 30px; height: 30px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; flex-shrink: 0; margin-top: 2px;
  }
  .msg.ai .avatar { background: var(--ink); color: white; font-size: 14px; }
  .msg.user .avatar { background: var(--tag-bg); border: 1px solid var(--border); font-size: 11px; font-weight: 500; color: var(--muted); }

  .bubble { padding: 0.8rem 1rem; border-radius: 12px; font-size: 0.875rem; line-height: 1.75; font-weight: 300; }
  .msg.user .bubble { background: var(--ink); color: white; border-radius: 12px 12px 2px 12px; font-weight: 400; }
  .msg.ai .bubble { background: var(--surface); border: 1px solid var(--border); border-radius: 12px 12px 12px 2px; }
  .msg.ai .bubble strong { font-weight: 500; }
  .msg.ai .bubble p { margin-bottom: 0.5em; }
  .msg.ai .bubble p:last-child { margin-bottom: 0; }

  .typing-wrap { display: flex; gap: 4px; align-items: center; padding: 0.2rem 0; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--border); animation: blink 1.2s infinite; }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%,80%,100% { opacity: 0.3; transform: scale(1); } 40% { opacity: 1; transform: scale(1.3); background: var(--ink); } }

  /* Cursor nhấp nháy khi đang gõ */
  .cursor {
    display: inline-block;
    font-size: 0.8em;
    color: var(--muted);
    animation: cursorBlink 0.6s infinite;
    margin-left: 1px;
    vertical-align: middle;
  }
  @keyframes cursorBlink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }

  .api-notice {
    margin: 0.75rem 1.5rem 0;
    padding: 0.9rem 1.1rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    display: flex; align-items: center; gap: 1rem; flex-wrap: wrap;
  }
  .api-notice p { font-size: 0.82rem; color: var(--muted); flex: 1; min-width: 180px; line-height: 1.5; }
  .api-notice a { color: var(--ink); font-weight: 500; }
  .key-row { display: flex; gap: 0.4rem; }
  .key-row input {
    padding: 0.5rem 0.75rem; border: 1px solid var(--border); border-radius: 7px;
    font-size: 0.82rem; font-family: monospace; outline: none; width: 190px;
    background: var(--bg); transition: border-color 0.15s;
  }
  .key-row input:focus { border-color: var(--ink); }
  .key-row button {
    background: var(--ink); color: white; border: none; border-radius: 7px;
    padding: 0 0.85rem; font-size: 0.8rem; cursor: pointer;
    font-family: 'DM Sans', sans-serif; font-weight: 500; transition: opacity 0.15s;
  }
  .key-row button:hover { opacity: 0.75; }

  .input-area { padding: 0.85rem 1.5rem 1rem; background: var(--surface); border-top: 1px solid var(--border); }
  .input-row {
    display: flex; gap: 0.6rem; align-items: flex-end;
    background: var(--bg); border: 1px solid var(--border); border-radius: 12px;
    padding: 0.6rem 0.6rem 0.6rem 1rem; transition: border-color 0.15s;
  }
  .input-row:focus-within { border-color: var(--ink); }
  textarea {
    flex: 1; border: none; outline: none; resize: none;
    font-family: 'DM Sans', sans-serif; font-size: 0.875rem; font-weight: 300;
    color: var(--ink); background: transparent; line-height: 1.5;
    min-height: 22px; max-height: 100px;
  }
  textarea::placeholder { color: var(--muted); }
  #sendBtn {
    width: 34px; height: 34px; border-radius: 8px; background: var(--ink);
    border: none; cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: opacity 0.15s; flex-shrink: 0;
  }
  #sendBtn:hover { opacity: 0.7; }
  #sendBtn:disabled { opacity: 0.2; cursor: not-allowed; }
  #sendBtn svg { width: 14px; height: 14px; fill: white; }
  .hint { font-size: 0.7rem; color: var(--muted); margin-top: 0.45rem; text-align: center; font-weight: 300; }

  @media (max-width: 540px) {
    header { padding: 0.85rem 1rem; }
    #disclaimer { display: none; }
    .topics { padding: 0.6rem 1rem; }
    #messages { padding: 1.25rem 1rem; }
    .input-area { padding: 0.75rem 1rem 0.9rem; }
    .api-notice { margin: 0.75rem 1rem 0; }
    .suggestions { grid-template-columns: 1fr; }
    .msg.user { max-width: 85%; }
  }
</style>
</head>
<body>

<header>
  <div class="brand" onclick="resetChat()">
    <span class="brand-name">Ninh Bình AI</span>
    <span class="brand-tag" id="brandTag">Trợ lý du lịch</span>
  </div>
  <div class="header-right">
    <span id="disclaimer">Thông tin mang tính chất tham khảo</span>

    <!-- Xóa chat -->
    <button class="icon-btn" id="clearBtn" onclick="clearChat()" data-tip="Xóa chat">
      <svg viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/>
      </svg>
    </button>

    <!-- Đổi API key -->
    <button class="icon-btn" id="keyBtn" onclick="resetKey()" data-tip="Đổi API Key">
      <svg viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="8" cy="15" r="3"/><path d="M11 15h9"/><path d="M17 12l3 3-3 3"/>
      </svg>
    </button>

    <!-- Ngôn ngữ -->
    <button id="langBtn" onclick="toggleLang()">EN</button>
  </div>
</header>

<nav class="topics" id="topicsNav"></nav>

<div id="messages">
  <div class="welcome" id="welcome">
    <h1 class="welcome-heading" id="welcomeHeading"></h1>
    <p class="welcome-sub" id="welcomeSub"></p>
    <div class="suggestions" id="sugGrid"></div>
  </div>
</div>

<div class="api-notice" id="apiSetup">
  <p id="apiText"></p>
  <div class="key-row">
    <input type="password" id="apiKeyInput" placeholder="AIzaSy..." />
    <button id="apiConnectBtn" onclick="saveKey()">Kết nối</button>
  </div>
</div>

<div class="input-area">
  <div class="input-row">
    <textarea id="userInput" rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button id="sendBtn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
  <p class="hint" id="hintText"></p>
</div>

let lang = localStorage.getItem('nb_lang') || 'vi';
let apiKey = localStorage.getItem('nb_key') || '';
let history = [];

if (apiKey) document.getElementById('apiSetup').style.display = 'none';
applyLang();

// ── ACTIONS ───────────────────────────────────────────
function clearChat() {
  const t = i18n[lang];
  if (!confirm(t.clearConfirm)) return;
  history = [];
  rebuildWelcome();
}

function resetKey() {
  const t = i18n[lang];
  if (!confirm(t.keyConfirm)) return;
  apiKey = '';
  localStorage.removeItem('nb_key');
  document.getElementById('apiKeyInput').value = '';
  document.getElementById('apiSetup').style.display = 'flex';
}

function resetChat() {
  history = [];
  rebuildWelcome();
}

function rebuildWelcome() {
  const wrap = document.getElementById('messages');
  wrap.innerHTML = `
    <div class="welcome" id="welcome">
      <h1 class="welcome-heading" id="welcomeHeading"></h1>
      <p class="welcome-sub" id="welcomeSub"></p>
      <div class="suggestions" id="sugGrid"></div>
    </div>`;
  applyLang();
}

// ── LANG ──────────────────────────────────────────────
function toggleLang() {
  lang = lang === 'vi' ? 'en' : 'vi';
  localStorage.setItem('nb_lang', lang);
  applyLang();
}

function applyLang() {
  const t = i18n[lang];
  document.getElementById('brandTag').textContent = t.brandTag;
  document.getElementById('disclaimer').textContent = t.disclaimer;
  document.getElementById('langBtn').textContent = t.langBtn;
  document.getElementById('userInput').placeholder = t.placeholder;
  document.getElementById('hintText').textContent = t.hint;
  document.getElementById('apiText').innerHTML = t.apiText;
  document.getElementById('apiConnectBtn').textContent = t.apiBtn;
  document.getElementById('clearBtn').setAttribute('data-tip', t.clearTip);
  document.getElementById('keyBtn').setAttribute('data-tip', t.keyTip);

  const wh = document.getElementById('welcomeHeading');
  if (wh) wh.innerHTML = t.welcomeH;
  const ws = document.getElementById('welcomeSub');
  if (ws) ws.textContent = t.welcomeSub;

  const nav = document.getElementById('topicsNav');
  nav.innerHTML = '';
  t.chips.forEach((label, i) => {
    const btn = document.createElement('button');
    btn.className = 'chip';
    btn.textContent = label;
    btn.onclick = () => quickAsk(t.chipQ[i]);
    nav.appendChild(btn);
  });

  const grid = document.getElementById('sugGrid');
  if (grid) {
    grid.innerHTML = '';
    t.sug.forEach(s => {
      const btn = document.createElement('button');
      btn.className = 'sug-btn';
      btn.innerHTML = `<span class="sug-icon">${s.icon}</span><span class="sug-text">${s.text}</span><span class="sug-label">${s.label}</span>`;
      btn.onclick = () => quickAsk(s.q);
      grid.appendChild(btn);
    });
  }
}

// ── API KEY ───────────────────────────────────────────
function saveKey() {
  const v = document.getElementById('apiKeyInput').value.trim();
  if (!v.startsWith('AIza')) {
    alert(lang === 'vi' ? 'Key không hợp lệ (phải bắt đầu bằng AIza...)' : 'Invalid key (must start with AIza...)');
    return;
  }
  apiKey = v;
  localStorage.setItem('nb_key', v);
  document.getElementById('apiSetup').style.display = 'none';
}

// ── HELPERS ───────────────────────────────────────────
function quickAsk(text) {
  document.getElementById('userInput').value = text;
  sendMessage();
}
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}
function removeWelcome() {
  const w = document.getElementById('welcome');
  if (w) w.remove();
}
function addMsg(role, text) {
  removeWelcome();
  const wrap = document.getElementById('messages');
  const el = document.createElement('div');
  el.className = `msg ${role}`;
  const av = document.createElement('div');
  av.className = 'avatar';
  av.textContent = role === 'ai' ? '✦' : i18n[lang].userAvatar;
  const b = document.createElement('div');
  b.className = 'bubble';
  if (role === 'ai') b.innerHTML = md(text);
  else b.textContent = text;
  if (role === 'user') { el.appendChild(b); el.appendChild(av); }
  else { el.appendChild(av); el.appendChild(b); }
  wrap.appendChild(el);
  wrap.scrollTop = wrap.scrollHeight;
}
function md(text) {
  return text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    .split('\n\n').map(p => `<p>${p.replace(/\n/g, '<br>')}</p>`).join('');
}
function showTyping() {
  removeWelcome();
  const wrap = document.getElementById('messages');
  const el = document.createElement('div');
  el.className = 'msg ai'; el.id = 'typing';
  const av = document.createElement('div');
  av.className = 'avatar'; av.textContent = '✦';
  const b = document.createElement('div');
  b.className = 'bubble';
  b.innerHTML = '<div class="typing-wrap"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>';
  el.appendChild(av); el.appendChild(b);
  wrap.appendChild(el);
  wrap.scrollTop = wrap.scrollHeight;
}

// Typewriter: hiện chữ dần dần
function typewriterMsg(text) {
  removeWelcome();
  const wrap = document.getElementById('messages');
  const el = document.createElement('div');
  el.className = 'msg ai';
  const av = document.createElement('div');
  av.className = 'avatar'; av.textContent = '✦';
  const b = document.createElement('div');
  b.className = 'bubble';
  el.appendChild(av); el.appendChild(b);
  wrap.appendChild(el);

  // Render markdown dần — hiện từng ký tự của raw text, parse markdown khi xong
  let i = 0;
  const speed = 12; // ms mỗi ký tự
  function tick() {
    if (i < text.length) {
      i += Math.ceil(text.length / 300) || 1; // tốc độ tự động theo độ dài
      if (i > text.length) i = text.length;
      b.innerHTML = md(text.slice(0, i)) + '<span class="cursor">▋</span>';
      wrap.scrollTop = wrap.scrollHeight;
      setTimeout(tick, speed);
    } else {
      b.innerHTML = md(text); // render đầy đủ khi xong
      wrap.scrollTop = wrap.scrollHeight;
    }
  }
  tick();
}

// ── SEND ──────────────────────────────────────────────
async function sendMessage() {
  const inp = document.getElementById('userInput');
  const text = inp.value.trim();
  if (!text) return;
  if (!apiKey) {
    document.getElementById('apiSetup').style.display = 'flex';
    alert(lang === 'vi' ? 'Vui lòng nhập Gemini API Key trước.' : 'Please enter your Gemini API Key first.');
    return;
  }
  inp.value = ''; inp.style.height = 'auto';
  document.getElementById('sendBtn').disabled = true;
  addMsg('user', text);
  history.push({ role: 'user', parts: [{ text }] });
  showTyping();
  try {
    const res = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          system_instruction: { parts: [{ text: SYSTEM[lang] }] },
          contents: history,
          generationConfig: { temperature: 0.8, maxOutputTokens: 8192 }
        })
      }
    );
    const d = await res.json();
    document.getElementById('typing')?.remove();
    if (d.error) {
      const msg = d.error.message || '';
      const isRate = msg.includes('quota') || msg.includes('rate') || msg.includes('429') || msg.includes('limit');
      addMsg('ai', isRate ? i18n[lang].rateLimitMsg : i18n[lang].errorMsg);
    } else {
      const reply = d.candidates?.[0]?.content?.parts?.[0]?.text || (lang === 'vi' ? 'Xin lỗi, thử lại nhé!' : 'Sorry, please try again!');
      typewriterMsg(reply);
      history.push({ role: 'model', parts: [{ text: reply }] });
      if (history.length > 20) history = history.slice(-20);
    }
  } catch {
    document.getElementById('typing')?.remove();
    addMsg('ai', i18n[lang].errorMsg);
  }
  document.getElementById('sendBtn').disabled = false;
  inp.focus();
}
</script>
